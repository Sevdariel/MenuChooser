<!-- TOP BAR -->
<div class="topbar" [formGroup]="productForm">
  <button class="topbar-back" (click)="cancel()">← Produkty</button>

  <div class="topbar-title">
    <input class="meta-input topbar-name-input" type="text" formControlName="name" placeholder="Nowy produkt">
    <small>Nowy produkt</small>
  </div>

  <div class="flex-gap">
    <button class="btn btn-ghost btn-sm" (click)="cancel()">Anuluj</button>
    <button class="btn btn-primary btn-sm" (click)="add($event)">Zapisz</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <form [formGroup]="productForm">

    <!-- PODSTAWOWE INFO -->
    <div class="section-card">
      <div class="section-head">
        <div class="section-head-title">📋 Informacje podstawowe</div>
      </div>
      <div class="section-body">

        <div class="field">
          <div class="field-label">Nazwa</div>
          <input class="field-input" type="text" formControlName="name" placeholder="Nazwa produktu">
        </div>

        <div class="field">
          <div class="field-label">Producent</div>
          <input class="field-input" type="text" formControlName="producent" placeholder="Producent">
        </div>

        <div class="field">
          <div class="field-label">Kategoria</div>
          <select class="field-input" formControlName="category">
            <option [value]="ProductCategory.VEGETABLES">Warzywa i owoce</option>
            <option [value]="ProductCategory.MEAT">Mięso i ryby</option>
            <option [value]="ProductCategory.DAIRY">Nabiał</option>
            <option [value]="ProductCategory.GRAINS">Produkty zbożowe</option>
            <option [value]="ProductCategory.OTHER">Inne</option>
          </select>
        </div>

        <div class="unit-row">
          <div class="field">
            <div class="field-label">Jednostka miary</div>
            <select class="field-input" formControlName="unit">
              <option value="g">gram (g)</option>
              <option value="kg">kilogram (kg)</option>
              <option value="ml">mililitr (ml)</option>
              <option value="l">litr (l)</option>
              <option value="szt">sztuka (szt.)</option>
            </select>
          </div>
          <div class="field">
            <div class="field-label">Opis</div>
            <input class="field-input" type="text" formControlName="sub" placeholder="np. świeży, mrożony...">
          </div>
        </div>

        <div class="field">
          <div class="field-label">Emoji</div>
          <input class="field-input emoji-input" type="text" formControlName="emoji" placeholder="🥦">
        </div>

      </div>
    </div>

    <!-- WARTOŚCI ODŻYWCZE -->
    <div class="section-card">
      <div class="section-head">
        <div class="section-head-title">🥗 Wartości odżywcze <span class="section-head-sub">na 100 g</span></div>
      </div>
      <div class="section-body macro-body">
        <div class="macro-grid">

          <div class="macro-cell">
            <div class="macro-label">Kalorie</div>
            <div class="macro-input-wrap">
              <input class="macro-input" type="number" formControlName="kcal">
              <span class="macro-unit">kcal</span>
            </div>
          </div>

          <div class="macro-cell">
            <div class="macro-label">Białko</div>
            <div class="macro-input-wrap">
              <input class="macro-input" type="number" formControlName="protein" step="0.1">
              <span class="macro-unit">g</span>
            </div>
          </div>

          <div class="macro-cell">
            <div class="macro-label">Węglowodany</div>
            <div class="macro-input-wrap">
              <input class="macro-input" type="number" formControlName="carbs" step="0.1">
              <span class="macro-unit">g</span>
            </div>
          </div>

          <div class="macro-cell">
            <div class="macro-label">Tłuszcze</div>
            <div class="macro-input-wrap">
              <input class="macro-input" type="number" formControlName="fat" step="0.1">
              <span class="macro-unit">g</span>
            </div>
          </div>

        </div>
      </div>
    </div>

  </form>
</div>
