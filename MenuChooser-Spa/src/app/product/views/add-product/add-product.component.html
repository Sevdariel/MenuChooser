<!-- TOP BAR -->
<div class="topbar">
  <button class="topbar-back" (click)="cancel()">← Produkty</button>

  <div class="topbar-title">
    <input class="meta-input" style="font-family:var(--font-display);font-size:20px;max-width:340px;" type="text" formControlName="name" placeholder="Nowy produkt">
    <small>Nowy produkt</small>
  </div>

  <div class="flex-gap">
    <button class="btn btn-ghost btn-sm" (click)="cancel()">Anuluj</button>
    <button class="btn btn-primary btn-sm" (click)="add($event)">Zapisz</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <form [formGroup]="productForm">
    <!-- META ROW -->
    <div class="meta-row">
      <div class="meta-cell">
        <div class="meta-label">Nazwa</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="name" type="text" class="field-input meta-input" pInputText formControlName="name" style="width:100%;">
          <label for="name">Nazwa produktu</label>
        </p-floatlabel>
      </div>
      <div class="meta-cell">
        <div class="meta-label">Producent</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="producent" type="text" class="field-input meta-input" pInputText formControlName="producent" style="width:100%;">
          <label for="producent">Producent</label>
        </p-floatlabel>
      </div>
    </div>

    <!-- CATEGORY ROW -->
    <div class="meta-row">
      <div class="meta-cell">
        <div class="meta-label">Kategoria</div>
        <select class="field-input meta-input" style="font-size:14px;width:200px;" formControlName="category">
          <option [value]="ProductCategory.VEGETABLES">Warzywa i owoce</option>
          <option [value]="ProductCategory.MEAT">Mięso i ryby</option>
          <option [value]="ProductCategory.DAIRY">Nabiał</option>
          <option [value]="ProductCategory.GRAINS">Produkty zbożowe</option>
          <option [value]="ProductCategory.OTHER">Inne</option>
        </select>
      </div>
      <div class="meta-cell">
        <div class="meta-label">Jednostka</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="unit" type="text" class="field-input meta-input" pInputText formControlName="unit" style="width:100px;">
          <label for="unit">Jednostka</label>
        </p-floatlabel>
      </div>
    </div>

    <!-- NUTRITION ROW -->
    <div class="meta-row">
      <div class="meta-cell">
        <div class="meta-label">🔥 Kcal</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="kcal" type="number" class="field-input meta-input" pInputText formControlName="kcal" style="width:100px;">
          <label for="kcal">Kcal</label>
        </p-floatlabel>
      </div>
      <div class="meta-cell">
        <div class="meta-label">💪 Białko</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="protein" type="number" class="field-input meta-input" pInputText formControlName="protein" style="width:100px;">
          <label for="protein">Białko (g)</label>
        </p-floatlabel>
      </div>
      <div class="meta-cell">
        <div class="meta-label">🍞 Węglowodany</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="carbs" type="number" class="field-input meta-input" pInputText formControlName="carbs" style="width:100px;">
          <label for="carbs">Węglowodany (g)</label>
        </p-floatlabel>
      </div>
      <div class="meta-cell">
        <div class="meta-label">🥑 Tłuszcze</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="fat" type="number" class="field-input meta-input" pInputText formControlName="fat" style="width:100px;">
          <label for="fat">Tłuszcze (g)</label>
        </p-floatlabel>
      </div>
    </div>

    <!-- SUB INFO -->
    <div class="meta-row">
      <div class="meta-cell" style="flex:1;">
        <div class="meta-label">Opis</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="sub" type="text" class="field-input meta-input" pInputText formControlName="sub" style="width:100%;">
          <label for="sub">Opis produktu</label>
        </p-floatlabel>
      </div>
    </div>

    <!-- EMOJI -->
    <div class="meta-row">
      <div class="meta-cell">
        <div class="meta-label">Emoji</div>
        <p-floatlabel variant="on" style="width:100%;">
          <input id="emoji" type="text" class="field-input meta-input" pInputText formControlName="emoji" style="width:80px;">
          <label for="emoji">Emoji</label>
        </p-floatlabel>
      </div>
    </div>
  </form>
</div>
